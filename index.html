<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>evan-lei 的小站</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0d1117;
      font-family: 'Noto Sans SC', sans-serif;
      color: #e6edf3;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 80px;
    }

    header {
      text-align: center;
      margin-bottom: 56px;
    }

    header h1 {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: clamp(2rem, 6vw, 3.5rem);
      background: linear-gradient(135deg, #58a6ff, #bc8cff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.04em;
    }

    header p {
      margin-top: 12px;
      color: #8b949e;
      font-size: 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
      width: 100%;
      max-width: 900px;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 28px 24px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent-gradient);
      opacity: 0;
      transition: opacity 0.3s;
      border-radius: 16px;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.4);
    }

    .card:hover::before { opacity: 0.06; }

    .card-icon {
      font-size: 2.4rem;
      line-height: 1;
    }

    .card-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: #e6edf3;
    }

    .card-desc {
      font-size: 0.875rem;
      color: #8b949e;
      line-height: 1.6;
    }

    .card-tag {
      display: inline-block;
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 20px;
      background: #21262d;
      color: #8b949e;
      border: 1px solid #30363d;
      width: fit-content;
      margin-top: auto;
    }

    /* 钓鱼课件 */
    .card-fishing {
      --accent: #58a6ff;
      --accent-gradient: linear-gradient(135deg, #58a6ff, #388bfd);
    }
    .card-fishing .card-tag { color: #58a6ff; border-color: #58a6ff44; background: #58a6ff11; }

    /* 三亚攻略 */
    .card-sanya {
      --accent: #0ea5e9;
      --accent-gradient: linear-gradient(135deg, #0ea5e9, #14b8a6);
    }
    .card-sanya .card-tag { color: #0ea5e9; border-color: #0ea5e9aa44; background: #0ea5e911; }

    /* 占位卡片 */
    .card-placeholder {
      --accent: #30363d;
      opacity: 0.45;
      cursor: default;
      pointer-events: none;
    }

    footer {
      margin-top: 72px;
      color: #484f58;
      font-size: 0.8rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <h1>evan-lei 的小站</h1>
    <p>一些小课件、小工具</p>
  </header>

  <div class="grid">
    <a href="./fishing/" class="card card-fishing">
      <div class="card-icon">🎣</div>
      <div class="card-title">跟着爸爸去中国钓鱼</div>
      <div class="card-desc">带孩子认识中国各地的鱼，幼儿园互动课件，含图片、视频和小游戏。</div>
      <span class="card-tag">幼儿课件</span>
    </a>

    <a href="./sanya/" class="card card-sanya">
      <div class="card-icon">🌴</div>
      <div class="card-title">跟着爸爸去三亚</div>
      <div class="card-desc">三亚旅行全攻略，含行程安排、景点地图、物品清单和出行贴士。</div>
      <span class="card-tag">旅游攻略</span>
    </a>
  </div>

  <footer>evan-lei.github.io · 用爱发电 ❤️</footer>
</body>
</html>
