<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>跟着爸爸去露营</title>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --forest: #2d6a4f;
      --sage:   #52b788;
      --leaf:   #95d5b2;
      --moss:   #1b4332;
      --dark:   #081c15;
      --panel:  rgba(17,34,24,0.85);
      --border: rgba(82,183,136,0.25);
      --text:   #d8f3dc;
      --muted:  #74b09a;
      --earth:  #c9a46e;
      --gold:   #f4a261;
    }

    html, body {
      width: 100vw; height: 100vh;
      overflow: hidden;
      font-family: 'Noto Sans SC', sans-serif;
      color: var(--text);
      background: var(--dark);
      user-select: none;
    }

    /* ══════════════════ SLIDE ENGINE ══════════════════ */
    .slide {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      opacity: 0;
      transform: scale(0.97) translateY(16px);
      transition: opacity 0.5s cubic-bezier(.4,0,.2,1), transform 0.5s cubic-bezier(.4,0,.2,1);
      pointer-events: none; overflow: hidden;
    }
    .slide.active  { opacity: 1; transform: scale(1) translateY(0); pointer-events: all; }
    .slide.exit    { opacity: 0; transform: scale(1.03) translateY(-16px); }

    /* ══════════════════ NAVIGATION ══════════════════ */
    #nav {
      position: fixed; bottom: 22px; right: 24px;
      z-index: 9999; display: flex; gap: 10px; align-items: center;
    }
    .nav-btn {
      background: rgba(255,255,255,0.92); border: none; border-radius: 50%;
      width: 46px; height: 46px; font-size: 20px; cursor: pointer;
      transition: transform .2s, box-shadow .2s;
      box-shadow: 0 3px 12px rgba(0,0,0,.3);
      display: flex; align-items: center; justify-content: center;
    }
    .nav-btn:hover { transform: scale(1.15); }
    #slide-num {
      background: rgba(0,0,0,.45); color: white;
      padding: 7px 16px; border-radius: 22px;
      font-size: 14px; font-weight: 700; font-family: 'Noto Sans SC', sans-serif;
    }
    #hint {
      position: fixed; bottom: 28px; left: 24px;
      color: rgba(255,255,255,.4); font-size: 12px; z-index: 9999;
    }

    /* ══════════════════ SLIDE 1 — COVER ══════════════════ */
    #s1 {
      background: radial-gradient(ellipse 140% 80% at 50% 110%, #0a2e1a 0%, #020a05 70%);
    }
    #s1 canvas { position: absolute; inset: 0; pointer-events: none; }
    .cover-content { position: relative; z-index: 2; text-align: center; padding: 0 20px; }
    .cover-eyebrow {
      font-size: clamp(0.7rem, 2vw, 0.85rem);
      letter-spacing: 0.35em; color: var(--sage);
      text-transform: uppercase; margin-bottom: 16px; opacity: 0.8;
    }
    .cover-title {
      font-family: 'Ma Shan Zheng', serif;
      font-size: clamp(3rem, 10vw, 7rem);
      background: linear-gradient(135deg, #95d5b2 0%, #52b788 50%, #f4a261 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 40px rgba(82,183,136,0.25));
      line-height: 1.1; margin-bottom: 24px;
    }
    .cover-camps {
      display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
      max-width: 640px; margin: 0 auto 32px;
    }
    .cover-camp-tag {
      padding: 8px 18px;
      border: 1px solid rgba(82,183,136,0.35);
      border-radius: 24px; font-size: clamp(0.75rem, 2vw, 0.9rem);
      color: var(--leaf); background: rgba(82,183,136,0.08);
      backdrop-filter: blur(6px); cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
    }
    .cover-camp-tag:hover {
      background: rgba(82,183,136,0.2);
      border-color: rgba(82,183,136,0.7);
      transform: translateY(-2px);
    }
    .cover-hint {
      font-size: 0.8rem; color: var(--muted); opacity: 0.6;
    }
    /* 树冠剪影 */
    .cover-trees {
      position: absolute; bottom: 0; left: 0; right: 0; pointer-events: none; z-index: 1;
    }

    /* ══════════════════ SLIDE 2-6 — CAMP ══════════════════ */
    .camp-slide {
      padding: 0; align-items: stretch;
    }
    .camp-slide-inner {
      width: 100%; height: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr;
    }

    /* 左侧：信息面板 */
    .camp-info-panel {
      display: flex; flex-direction: column;
      justify-content: center; padding: clamp(28px,5vw,64px);
      position: relative; z-index: 2;
    }
    .camp-number {
      font-size: clamp(4rem, 10vw, 8rem);
      font-family: 'Ma Shan Zheng', serif;
      line-height: 1; opacity: 0.12;
      position: absolute; top: clamp(16px,3vh,32px); left: clamp(28px,5vw,64px);
      pointer-events: none;
    }
    .camp-badge {
      display: inline-flex; align-items: center; gap: 8px;
      margin-bottom: 12px;
    }
    .camp-badge-num {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700;
    }
    .camp-badge-label {
      font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; opacity: 0.7;
    }
    .camp-name {
      font-family: 'Ma Shan Zheng', serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      line-height: 1.2; margin-bottom: 20px;
    }
    .camp-warn-badge {
      display: inline-block;
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 0.65rem; background: rgba(244,162,97,0.2);
      border: 1px solid rgba(244,162,97,0.5); color: var(--gold);
      padding: 2px 10px; border-radius: 12px; margin-left: 8px;
      vertical-align: middle;
    }
    .camp-status-badge {
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 0.65rem; padding: 2px 10px; border-radius: 12px;
      margin-left: 6px; vertical-align: middle;
    }
    .camp-status-done {
      background: rgba(82,183,136,0.15);
      border: 1px solid rgba(82,183,136,0.45);
      color: var(--leaf);
    }
    .camp-status-todo {
      background: rgba(180,180,180,0.1);
      border: 1px solid rgba(180,180,180,0.3);
      color: rgba(200,200,200,0.65);
    }
    .camp-meta {
      display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px;
    }
    .camp-meta-row {
      display: flex; align-items: baseline; gap: 8px;
    }
    .camp-meta-label {
      font-size: 0.68rem; letter-spacing: 0.1em;
      color: var(--muted); text-transform: uppercase; min-width: 3.5rem;
      flex-shrink: 0;
    }
    .camp-meta-value {
      font-size: clamp(0.85rem, 1.5vw, 1rem);
      line-height: 1.4;
    }
    .camp-meta-value.free { color: var(--sage); font-weight: 600; }
    .camp-meta-value.paid { color: var(--gold); font-weight: 600; }
    .camp-actions { display: flex; flex-direction: column; gap: 10px; }
    .camp-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 11px 22px; border-radius: 28px; border: none;
      font-size: 0.88rem; font-family: 'Noto Sans SC', sans-serif;
      cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
      font-weight: 600; letter-spacing: 0.03em;
    }
    .camp-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
    .camp-btn:active { transform: scale(0.96); }
    .camp-btn-primary {
      background: linear-gradient(135deg, var(--forest), var(--sage));
      color: white;
    }
    .camp-btn-secondary {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      color: var(--text);
    }
    .camp-btn-douyin {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(244,162,97,0.4);
      color: var(--gold);
    }
    .camp-btn-douyin.copied { background: rgba(82,183,136,0.25); color: var(--leaf); border-color: var(--leaf); }

    /* 右侧：图片预览 */
    .camp-preview-panel {
      position: relative; overflow: hidden;
    }
    .camp-preview-grid {
      display: grid; width: 100%; height: 100%;
      gap: 3px;
    }
    .camp-preview-grid.g1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
    .camp-preview-grid.g2 { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
    .camp-preview-grid.g3 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
    .camp-preview-grid.g3 .thumb:first-child { grid-row: 1 / 3; }
    .camp-preview-grid.g4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
    /* 竖图在左，多张横图在右堆叠 */
    .camp-preview-grid.g-portrait { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; }
    .camp-preview-grid.g-portrait .thumb:first-child { grid-row: 1 / 4; }
    .thumb {
      overflow: hidden; cursor: pointer; position: relative;
    }
    .thumb img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.4s ease;
    }
    .thumb:hover img { transform: scale(1.06); }
    .thumb-more {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      font-weight: 700; color: white;
      backdrop-filter: blur(2px);
    }

    /* ══════════════════ GALLERY MODAL ══════════════════ */
    #gallery {
      position: fixed; inset: 0; z-index: 10000;
      background: rgba(0,0,0,0.95);
      display: flex; flex-direction: column;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
      backdrop-filter: blur(12px);
    }
    #gallery.open { opacity: 1; pointer-events: all; }

    .gal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .gal-title { font-size: 1rem; font-weight: 600; color: var(--leaf); }
    .gal-tabs { display: flex; gap: 4px; }
    .gal-tab {
      padding: 5px 16px; border-radius: 16px; border: none;
      font-size: 0.8rem; font-family: 'Noto Sans SC', sans-serif;
      cursor: pointer; transition: background 0.2s; color: var(--muted);
      background: transparent;
    }
    .gal-tab.active { background: rgba(82,183,136,0.25); color: var(--leaf); }
    .gal-close {
      width: 36px; height: 36px; border-radius: 50%; border: none;
      background: rgba(255,255,255,0.1); color: white;
      font-size: 1.2rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .gal-close:hover { background: rgba(255,255,255,0.2); }

    /* Main area */
    .gal-main {
      flex: 1; display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden; min-height: 0;
    }
    .gal-main-img {
      max-width: 100%; max-height: 100%;
      object-fit: contain; display: block;
      border-radius: 6px;
    }
    .gal-main-video {
      max-width: 100%; max-height: 100%;
      border-radius: 6px; display: block;
    }
    .gal-nav-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 44px; height: 44px; border-radius: 50%; border: none;
      background: rgba(0,0,0,0.5); color: white; font-size: 1.4rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .gal-nav-btn:hover { background: rgba(255,255,255,0.15); }
    .gal-nav-prev { left: 12px; }
    .gal-nav-next { right: 12px; }
    .gal-counter {
      position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
      font-size: 0.75rem; color: rgba(255,255,255,0.5);
      background: rgba(0,0,0,0.4); padding: 3px 12px; border-radius: 12px;
    }

    /* Thumbnail strip */
    .gal-strip {
      display: flex; gap: 6px; padding: 10px 16px;
      overflow-x: auto; flex-shrink: 0;
      scrollbar-width: thin; scrollbar-color: var(--forest) transparent;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .gal-strip::-webkit-scrollbar { height: 4px; }
    .gal-strip::-webkit-scrollbar-thumb { background: var(--forest); border-radius: 2px; }
    .gal-thumb-item {
      flex-shrink: 0; width: 72px; height: 54px;
      border-radius: 6px; overflow: hidden; cursor: pointer;
      border: 2px solid transparent; transition: border-color 0.2s, opacity 0.2s;
      opacity: 0.6; position: relative;
    }
    .gal-thumb-item:hover { opacity: 0.9; }
    .gal-thumb-item.active { border-color: var(--sage); opacity: 1; }
    .gal-thumb-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .gal-thumb-item.video-thumb::after {
      content: '▶';
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; color: white;
      background: rgba(0,0,0,0.4);
    }

    /* ══════════════════ SLIDE BACKGROUNDS ══════════════════ */
    #s2 { background: linear-gradient(135deg, #0d2818 0%, #1a3a28 60%, #0a1f10 100%); }
    #s3 { background: linear-gradient(135deg, #0d2020 0%, #1a3632 60%, #0a1a18 100%); }
    #s4 { background: linear-gradient(135deg, #1a1a0d 0%, #2a2818 60%, #120f08 100%); }
    #s5 { background: linear-gradient(135deg, #0d1e20 0%, #1a2e30 60%, #081414 100%); }
    #s6 { background: linear-gradient(135deg, #0d1e2a 0%, #1a2e3a 60%, #08141e 100%); }
    #s7 { background: linear-gradient(135deg, #1a0d28 0%, #281a3a 60%, #100818 100%); }

    /* ══════════════════ MISC ══════════════════ */
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.85) translateY(12px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .anim { animation: popIn 0.6s cubic-bezier(.34,1.56,.64,1) both; }
    .d1 { animation-delay: 0.05s; } .d2 { animation-delay: 0.12s; }
    .d3 { animation-delay: 0.19s; } .d4 { animation-delay: 0.26s; }
    .d5 { animation-delay: 0.33s; } .d6 { animation-delay: 0.4s; }

    @media (max-width: 700px) {
      .camp-slide-inner {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }
      .camp-info-panel { padding: 24px 20px 12px; justify-content: flex-start; }
      .camp-number { display: none; }
      .camp-name { font-size: 1.8rem; margin-bottom: 12px; }
      .camp-meta { gap: 6px; margin-bottom: 16px; }
      .camp-actions { flex-direction: row; flex-wrap: wrap; }
      .camp-btn { padding: 8px 14px; font-size: 0.78rem; }
      .camp-preview-grid.g3 .thumb:first-child { grid-row: auto; }
      .gal-thumb-item { width: 56px; height: 42px; }
    }
  </style>
</head>
<body>

<!-- ══════════ NAVIGATION ══════════ -->
<div id="nav">
  <button class="nav-btn" onclick="prevSlide()">‹</button>
  <div id="slide-num">1 / 6</div>
  <button class="nav-btn" onclick="nextSlide()">›</button>
</div>
<div id="hint">← → 键翻页 · 点击卡片或按钮查看详情</div>

<!-- ══════════ GALLERY MODAL ══════════ -->
<div id="gallery">
  <div class="gal-header">
    <span class="gal-title" id="galTitle">图片预览</span>
    <div class="gal-tabs" id="galTabs"></div>
    <button class="gal-close" onclick="closeGallery()">✕</button>
  </div>
  <div class="gal-main" id="galMain">
    <button class="gal-nav-btn gal-nav-prev" onclick="galNav(-1)">‹</button>
    <div id="galContent" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;"></div>
    <button class="gal-nav-btn gal-nav-next" onclick="galNav(1)">›</button>
    <div class="gal-counter" id="galCounter"></div>
  </div>
  <div class="gal-strip" id="galStrip"></div>
</div>

<!-- ══════════ SLIDE 1 — COVER ══════════ -->
<div class="slide active" id="s1">

</div>

/* ─── Build Cover Tags ─── */
(function() {
  const container = document.getElementById('coverCamps');
  const delays = ['d2','d3','d4','d5','d6','d6','d6'];
  CAMPS.forEach((c, idx) => {
    const icon = c.status === '去过' ? '✅' : '📌';
    const span = document.createElement('span');
    span.className = `cover-camp-tag anim ${delays[idx] || 'd6'}`;
    span.textContent = `${c.num} · ${c.name} ${icon}`;
    span.onclick = () => goToSlide(idx + 1);
    container.appendChild(span);
  });
})();

/* ─── Build Camp Slides ─── */
CAMPS.forEach((c, idx) => {
  const slideId = `s${idx + 2}`;
  const allMedia = [...c.photos.map(p => ({ type:'photo', src: COS + p })),
                    ...c.videos.map(v => ({ type:'video', src: COS + v }))];

  let previewPhotos, gridClass, thumbsHtml;
  const extraCount = c.photos.length - Math.min(c.photos.length, 4) + c.videos.length;

  if (c.portraitPreview) {
    // 竖图（map）在左，横图在右堆叠
    gridClass = 'g-portrait';
    const rightPhotos = c.photos.slice(0, 3);
    thumbsHtml = `<div class="thumb" onclick="openGallery(${idx}, 0, 0)">
      <img src="${COS + c.map}" loading="lazy">
    </div>` + rightPhotos.map((p, i) => {
      const isLast = i === rightPhotos.length - 1 && extraCount > 0;
      return `<div class="thumb" onclick="openGallery(${idx}, 0, ${i + 1})">
        <img src="${COS + p}" loading="lazy">
        ${isLast ? `<div class="thumb-more">+${extraCount}</div>` : ''}
      </div>`;
    }).join('');
  } else {
    previewPhotos = c.photos.slice(0, 4);
    gridClass = previewPhotos.length >= 4 ? 'g4' : previewPhotos.length === 3 ? 'g3' : previewPhotos.length === 2 ? 'g2' : 'g1';
    thumbsHtml = previewPhotos.map((p, i) => {
      const isLast = i === previewPhotos.length - 1 && extraCount > 0;
      return `<div class="thumb" onclick="openGallery(${idx}, 0, ${i})">
        <img src="${COS + p}" loading="lazy">
        ${isLast ? `<div class="thumb-more">+${extraCount}</div>` : ''}
      </div>`;
    }).join('');
  }

  const btnHtml = `
    <button class="camp-btn camp-btn-primary anim d4" onclick="openGallery(${idx}, 0, 0)">
      📸 查看全部 ${c.photos.length} 张图片${c.videos.length ? ' · ' + c.videos.length + ' 段视频' : ''}
    </button>
    ${c.douyin ? `<button class="camp-btn camp-btn-douyin anim d5" id="btn-douyin-${c.id}" onclick="copyDouyin('${c.id}')">
      🎵 复制抖音口令预订
    </button>` : ''}
  `;

  const warnBadge = c.warn ? `<span class="camp-warn-badge">${c.warn}</span>` : '';
  const statusBadge = c.status === '去过'
    ? `<span class="camp-status-badge camp-status-done">✅ 去过</span>`
    : `<span class="camp-status-badge camp-status-todo">📌 待打卡</span>`;

  const slide = document.createElement('div');
  slide.className = 'slide camp-slide';
  slide.id = slideId;
  slide.innerHTML = `
    <div class="camp-slide-inner">
      <div class="camp-info-panel">
        <div class="camp-number" style="color:${c.accentColor}">${c.num}</div>
        <div class="camp-badge anim">
          <div class="camp-badge-num" style="background:${c.accentColor}22;color:${c.accentColor}">${c.num}</div>
          <span class="camp-badge-label" style="color:${c.accentColor}">营地</span>
        </div>
        <div class="camp-name anim d1" style="color:${c.accentColor}">${c.name}${warnBadge}${statusBadge}</div>
        <div class="camp-meta">
          <div class="camp-meta-row anim d2">
            <span class="camp-meta-label">📍 地点</span>

          <div class="camp-meta-row anim d2">

            <span class="camp-meta-value">${c.distance}</span>
          </div>
          <div class="camp-meta-row anim d3">
            <span class="camp-meta-label">💰 费用</span>
            <span class="camp-meta-value ${c.fee}">${c.feeText}</span>

        ${c.tip ? `<div class="camp-meta-row anim d3" style="margin-bottom:20px;opacity:0.65;font-size:0.82rem;line-height:1.6">${c.tip}</div>` : ''}

});

/* ─── Slide Engine ─── */
const slides = () => document.querySelectorAll('.slide');
let cur = 0;
const total = CAMPS.length + 1; // 6 camps + 1 cover = 7

function updateNav() {
  document.getElementById('slide-num').textContent = `${cur + 1} / ${total}`;
}
function goToSlide(idx) {
  if (idx === cur) return;
  slides().forEach(s => s.classList.remove('active', 'exit'));
  slides()[cur].classList.add('exit');
  cur = idx;
  slides()[cur].classList.add('active');
  setTimeout(() => slides().forEach(s => s.classList.remove('exit')), 520);
  updateNav();
}
function nextSlide() { goToSlide((cur + 1) % total); }
function prevSlide() { goToSlide((cur - 1 + total) % total); }

document.addEventListener('keydown', e => {
  if (document.getElementById('gallery').classList.contains('open')) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextSlide();
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   prevSlide();
});

/* ─── Gallery ─── */
let galCamp = 0, galTab = 'photo', galIdx = 0;

function getItems(campIdx, tab) {
  const c = CAMPS[campIdx];
  if (tab === 'photo') return [{ type:'photo', src: COS + c.map }, ...c.photos.map(p => ({ type:'photo', src: COS + p }))];
  if (tab === 'video') return c.videos.map(v => ({ type:'video', src: COS + v }));
  return [];
}

function openGallery(campIdx, tabIdx, itemIdx) {
  galCamp = campIdx;
  const c = CAMPS[campIdx];
  galTab = tabIdx === 1 ? 'video' : 'photo';
  galIdx = tabIdx === 1 ? itemIdx : itemIdx + 1; // +1 to skip map if going to photo

  document.getElementById('galTitle').textContent = c.name;

  // Build tabs
  const tabsEl = document.getElementById('galTabs');
  tabsEl.innerHTML = `<button class="gal-tab ${galTab==='photo'?'active':''}" onclick="switchGalTab('photo')">🖼 图片 (${c.photos.length + 1})</button>`;
  if (c.videos.length) {
    tabsEl.innerHTML += `<button class="gal-tab ${galTab==='video'?'active':''}" onclick="switchGalTab('video')">🎬 视频 (${c.videos.length})</button>`;
  }

  renderGallery();
  document.getElementById('gallery').classList.add('open');
}

function switchGalTab(tab) {
  galTab = tab;
  galIdx = 0;
  document.querySelectorAll('.gal-tab').forEach(t => {
    t.classList.toggle('active', t.textContent.includes(tab === 'photo' ? '图片' : '视频'));
  });
  renderGallery();
}

function renderGallery() {
  const items = getItems(galCamp, galTab);
  if (!items.length) return;
  galIdx = Math.max(0, Math.min(galIdx, items.length - 1));

  // Main content
  const item = items[galIdx];
  const contentEl = document.getElementById('galContent');
  contentEl.innerHTML = '';
  if (item.type === 'photo') {
    const img = document.createElement('img');
    img.className = 'gal-main-img';
    img.src = item.src;
    contentEl.appendChild(img);
  } else {
    const vid = document.createElement('video');
    vid.className = 'gal-main-video';
    vid.controls = true; vid.autoplay = false; vid.playsinline = true;
    vid.src = item.src;
    contentEl.appendChild(vid);
  }

  document.getElementById('galCounter').textContent = `${galIdx + 1} / ${items.length}`;

  // Strip
  const strip = document.getElementById('galStrip');
  strip.innerHTML = items.map((it, i) => {
    const isVid = it.type === 'video';
    return `<div class="gal-thumb-item ${i === galIdx ? 'active' : ''} ${isVid ? 'video-thumb' : ''}" onclick="galGoTo(${i})">
      ${isVid
        ? `<video src="${it.src}" style="width:100%;height:100%;object-fit:cover" preload="metadata"></video>`
        : `<img src="${it.src}" loading="lazy">`}
    </div>`;
  }).join('');

  // Scroll active thumb into view
  const activeThumb = strip.querySelector('.active');
  if (activeThumb) activeThumb.scrollIntoView({ block: 'nearest', inline: 'center' });
}

function galGoTo(i) {
  galIdx = i;
  renderGallery();
}
function galNav(dir) {
  const items = getItems(galCamp, galTab);
  galIdx = (galIdx + dir + items.length) % items.length;
  renderGallery();
}
function closeGallery() {
  const vid = document.querySelector('#galContent video');
  if (vid) vid.pause();
  document.getElementById('gallery').classList.remove('open');
}

document.getElementById('gallery').addEventListener('click', e => {
  if (e.target === document.getElementById('gallery')) closeGallery();
});
document.addEventListener('keydown', e => {
  if (!document.getElementById('gallery').classList.contains('open')) return;
  if (e.key === 'Escape') closeGallery();
  if (e.key === 'ArrowRight') galNav(1);
  if (e.key === 'ArrowLeft')  galNav(-1);
  e.stopImmediatePropagation();
}, true);

/* ─── Douyin Copy ─── */
function copyDouyin(id) {
  const camp = CAMPS.find(c => c.id === id);
  if (!camp || !camp.douyin) return;
  const btn = document.getElementById(`btn-douyin-${id}`);
  navigator.clipboard.writeText(camp.douyin).then(() => {
    btn.textContent = '✅ 已复制！去抖音打开';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '🎵 复制抖音口令预订';
      btn.classList.remove('copied');
    }, 2500);
  }).catch(() => {
    btn.textContent = '👆 复制失败，请手动复制';
    setTimeout(() => { btn.textContent = '🎵 复制抖音口令预订'; }, 2500);
  });
}

/* ─── Firefly Animation ─── */
const canvas = document.getElementById('fireflyCanvas');
const ctx = canvas.getContext('2d');
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resizeCanvas(); window.addEventListener('resize', resizeCanvas);

const fireflies = Array.from({ length: 60 }, () => ({
  x: Math.random() * window.innerWidth,
  y: Math.random() * window.innerHeight,
  r: 0.8 + Math.random() * 1.4,
  vx: (Math.random() - 0.5) * 0.35,
  vy: (Math.random() - 0.5) * 0.35,
  alpha: Math.random(),
  alphaDir: Math.random() > 0.5 ? 1 : -1,
  alphaSpeed: 0.007 + Math.random() * 0.011,
  hue: 100 + Math.random() * 60,
}));

function animateFireflies() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  fireflies.forEach(f => {
    f.x += f.vx; f.y += f.vy;
    f.alpha += f.alphaDir * f.alphaSpeed;
    if (f.alpha >= 1 || f.alpha <= 0) f.alphaDir *= -1;
    if (f.x < 0) f.x = canvas.width;
    if (f.x > canvas.width) f.x = 0;
    if (f.y < 0) f.y = canvas.height;
    if (f.y > canvas.height) f.y = 0;
    ctx.save();
    ctx.globalAlpha = f.alpha * 0.8;
    ctx.shadowBlur = 8; ctx.shadowColor = `hsl(${f.hue},80%,65%)`;
    ctx.beginPath(); ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
    ctx.fillStyle = `hsl(${f.hue},80%,70%)`; ctx.fill();
    ctx.restore();
  });
  requestAnimationFrame(animateFireflies);
}
animateFireflies();
